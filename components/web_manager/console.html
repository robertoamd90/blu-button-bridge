<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BluButtonBridge Console</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; display: flex; flex-direction: column; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; background: #0f172a; color: #e2e8f0; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: .9rem 1rem; background: #111827; border-bottom: 1px solid rgba(255,255,255,.08); flex-shrink: 0; }
    h1 { margin: 0; font-size: .95rem; font-weight: 600; }
    .actions { display: flex; gap: .5rem; }
    button, a { border: none; border-radius: 6px; padding: .45rem .8rem; background: #1f2937; color: #f8fafc; cursor: pointer; text-decoration: none; font: inherit; }
    button:hover, a:hover { background: #334155; }
    #status { font-size: .78rem; color: #93c5fd; }
    main { flex: 1; min-height: 0; padding: 1rem; display: flex; }
    .console-shell { width: min(1200px, 100%); margin: 0 auto; display: flex; flex-direction: column; gap: .75rem; min-height: 0; }
    .console-meta { display: flex; justify-content: space-between; align-items: center; gap: 1rem; color: #94a3b8; font-size: .78rem; }
    .console-frame { flex: 1; min-height: 0; border: 1px solid rgba(148,163,184,.2); border-radius: 10px; background: #020617; box-shadow: inset 0 1px 0 rgba(255,255,255,.03); overflow: hidden; }
    #console { height: 100%; overflow-y: auto; margin: 0; padding: 1rem; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; }
    .line { margin: 0 0 .18rem; color: #cbd5e1; }
    .line.info { color: #4ade80; }
    .line.warn { color: #facc15; }
    .line.error { color: #f87171; }
    .line.notice { color: #93c5fd; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Live Console</h1>
      <div id="status">Connecting…</div>
    </div>
    <div class="actions">
      <button onclick="clearView()">Clear View</button>
      <a href="/">Back</a>
    </div>
  </header>
  <main>
    <div class="console-shell">
      <div class="console-meta">
        <span>Live serial log stream with in-memory backlog</span>
        <span id="line-count">0 lines</span>
      </div>
      <div class="console-frame">
        <pre id="console"></pre>
      </div>
    </div>
  </main>
  <script>
    const consoleEl = document.getElementById('console');
    const statusEl = document.getElementById('status');
    const lineCountEl = document.getElementById('line-count');

    function classifyLine(text, kind) {
      if (kind === 'notice') return 'notice';
      const first = (text || '').trimStart().charAt(0);
      if (first === 'E') return 'error';
      if (first === 'W') return 'warn';
      if (first === 'I') return 'info';
      return '';
    }

    function updateLineCount() {
      const lineCount = consoleEl.childElementCount;
      lineCountEl.textContent = `${lineCount} line${lineCount === 1 ? '' : 's'}`;
    }

    function appendLine(text, kind = 'log') {
      const stickToBottom = consoleEl.scrollTop + consoleEl.clientHeight >= consoleEl.scrollHeight - 24;
      const line = document.createElement('div');
      line.className = 'line';
      const levelClass = classifyLine(text, kind);
      if (levelClass) line.classList.add(levelClass);
      line.textContent = text;
      consoleEl.appendChild(line);
      updateLineCount();
      if (stickToBottom) {
        consoleEl.scrollTop = consoleEl.scrollHeight;
      }
    }

    function clearView() {
      consoleEl.textContent = '';
      updateLineCount();
    }

    const source = new EventSource('/api/console/stream');
    source.onopen = () => { statusEl.textContent = 'Connected'; };
    source.onerror = () => { statusEl.textContent = 'Disconnected. Reload the page to reconnect.'; };
    source.addEventListener('log', (event) => appendLine(event.data, 'log'));
    source.addEventListener('notice', (event) => appendLine('[console] ' + event.data, 'notice'));
    source.addEventListener('replaced', (event) => {
      appendLine('[console] ' + event.data, 'notice');
      statusEl.textContent = 'Superseded by a newer console tab';
      source.close();
    });
    updateLineCount();
  </script>
</body>
</html>
